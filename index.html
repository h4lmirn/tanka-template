<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短歌アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f6;
  --panel: #ffffff;
  --ink: #2f3437;
  --muted: #6f757a;
  --line: #d8dddf;
  --accent: #2a6779;
}
body {
  font-family: 'Noto Serif JP', serif;
  background: linear-gradient(160deg, #fcfcfb 0%, #f3f5f4 100%);
  color: var(--ink);
  min-height: 100vh;
}
header {
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 24px 24px;
  text-align: center;
}
.tag {
  font-family: 'Inter', sans-serif;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: .1em;
  text-transform: uppercase;
}
h1 {
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 600;
  letter-spacing: .06em;
  line-height: 1.3;
  margin-top: 10px;
}
.sub { margin-top: 8px; color: var(--muted); font-size: 14px; }
.tip {
  margin: 20px auto 0;
  max-width: 680px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--muted);
  background: #eef4f6;
  border: 1px solid #d8e5ea;
  border-radius: 10px;
  padding: 10px 14px;
}
.controls { max-width: 760px; margin: 0 auto; padding: 12px 24px 0; }
.search {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--panel);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
}
.search:focus { outline: 2px solid #9ac4d3; outline-offset: 1px; }
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.label { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); }
.pill {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
}
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.sort { margin-left: auto; display: flex; align-items: center; gap: 6px; }
select {
  padding: 5px 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
}
main { max-width: 760px; margin: 0 auto; padding: 16px 24px 56px; }
.count {
  font-family: 'Inter', sans-serif;
  color: var(--muted);
  font-size: 12px;
  text-align: right;
  margin: 10px 0;
}
ul { list-style: none; }
.item {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 22px 20px;
  margin-bottom: 10px;
}
.text { font-size: 20px; line-height: 2; letter-spacing: .06em; word-break: break-word; }
.meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
.date { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); }
.series {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  border: 1px solid #bfc8cc;
  border-radius: 999px;
  padding: 2px 8px;
  color: #4c555a;
}
.post {
  margin-left: auto;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
}
.empty { padding: 36px 8px; text-align: center; color: var(--muted); font-family: 'Inter', sans-serif; }
footer { max-width: 760px; margin: 0 auto; padding: 0 24px 40px; text-align: center; }
footer a { font-family: 'Inter', sans-serif; color: var(--muted); font-size: 12px; text-decoration: none; }
@media (max-width: 640px) {
  .sort { margin-left: 0; }
  .text { font-size: 18px; }
}
</style>
</head>
<body>
<header>
  <div class="tag">Tanka Archive</div>
  <h1 id="siteTitle">あなたの名前</h1>
  <p class="sub" id="siteSub"></p>
  <p class="tip">テーマは GitHub の Actions タブから「テーマを選ぶ（index.html を切り替え）」を実行すると変更できます。</p>
</header>

<section class="controls">
  <input class="search" id="searchInput" type="text" placeholder="短歌を検索…">
  <div class="row">
    <span class="label">連作</span>
    <div id="pillContainer"></div>
    <div class="sort">
      <label class="label" for="sortSelect">並び</label>
      <select id="sortSelect">
        <option value="date-desc">新しい順</option>
        <option value="date-asc">古い順</option>
      </select>
    </div>
  </div>
</section>

<main>
  <div class="count" id="countLabel"></div>
  <ul id="tankaList"></ul>
</main>

<footer>
  <a id="footerLink" href="https://x.com/your_handle" target="_blank" rel="noopener">@your_handle</a>
</footer>

<script>
const CONFIG = {
  name: "あなたの名前",
  sub: "",
  xHandle: "your_handle",
  siteUrl: ""
};

document.getElementById("siteTitle").textContent = CONFIG.name;
document.title = CONFIG.name;
if (CONFIG.sub) document.getElementById("siteSub").textContent = CONFIG.sub;
const footerLink = document.getElementById("footerLink");
if (CONFIG.xHandle) {
  footerLink.textContent = "@" + CONFIG.xHandle;
  footerLink.href = "https://x.com/" + CONFIG.xHandle;
} else {
  footerLink.textContent = "xHandle未設定";
  footerLink.removeAttribute("href");
}

let allTanka = [];
let activeFilter = "all";

function getSeries(t) {
  return Array.isArray(t.series)
    ? t.series
    : (t.series ? t.series.split(",").map(s => s.trim()).filter(Boolean) : []);
}

function buildPills(data) {
  const set = new Set(data.flatMap(t => getSeries(t)));
  const container = document.getElementById("pillContainer");
  container.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.className = "pill" + (activeFilter === "all" ? " active" : "");
  allBtn.textContent = "すべて";
  allBtn.onclick = () => { activeFilter = "all"; render(); };
  container.appendChild(allBtn);

  [...set].sort().forEach(series => {
    const btn = document.createElement("button");
    btn.className = "pill" + (activeFilter === series ? " active" : "");
    btn.textContent = series;
    btn.onclick = () => { activeFilter = series; render(); };
    container.appendChild(btn);
  });
}

function render() {
  const q = document.getElementById("searchInput").value.trim();
  const sort = document.getElementById("sortSelect").value;

  buildPills(allTanka);

  const filtered = allTanka
    .filter(t => {
      if (activeFilter !== "all" && !getSeries(t).includes(activeFilter)) return false;
      if (q && !t.text.includes(q)) return false;
      return true;
    })
    .sort((a, b) => {
      const da = new Date(a.date || "1900-01-01");
      const db = new Date(b.date || "1900-01-01");
      return sort === "date-asc" ? da - db : db - da;
    });

  const list = document.getElementById("tankaList");
  list.innerHTML = "";
  document.getElementById("countLabel").textContent = filtered.length + " 首";

  if (!filtered.length) {
    list.innerHTML = "<li class=\"empty\">短歌はまだありません。Actions から「短歌を追加する」を実行してみてください。</li>";
    return;
  }

  filtered.forEach(t => {
    const li = document.createElement("li");
    li.className = "item";
    const dateLabel = t.date
      ? new Date(t.date).toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric" })
      : "";
    const tweetText = encodeURIComponent(t.text + "\n" + CONFIG.name + (CONFIG.siteUrl ? "\n" + CONFIG.siteUrl : ""));
    li.innerHTML = `
      <div class="text">${t.text}</div>
      <div class="meta">
        ${dateLabel ? `<span class="date">${dateLabel}</span>` : ""}
        ${getSeries(t).map(s => `<span class="series">${s}</span>`).join("")}
        <a class="post" href="https://twitter.com/intent/tweet?text=${tweetText}" target="_blank" rel="noopener">ポスト</a>
      </div>
    `;
    list.appendChild(li);
  });
}

fetch("tanka.json")
  .then(r => r.json())
  .then(d => {
    allTanka = d;
    render();
  })
  .catch(() => {
    document.getElementById("tankaList").innerHTML = "<li class=\"empty\">tanka.json が見つかりませんでした。</li>";
  });

document.getElementById("searchInput").addEventListener("input", render);
document.getElementById("sortSelect").addEventListener("change", render);
</script>
</body>
</html>
